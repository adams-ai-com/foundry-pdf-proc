name: gitleaks

# Secret scan on every push and PR. Fails the build if any secret is detected.
# Uses the free, open-source gitleaks binary directly: the gitleaks-action
# wrapper requires a paid license for organization-owned repos.
on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so secrets in any commit are caught
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Scan for secrets
        run: gitleaks git --redact --no-banner .
